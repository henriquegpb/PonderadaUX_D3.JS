<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mapa + Grafo: Rastreamento SP</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f0f2f5;
}

#controls{
padding:10px;
text-align:center;
background:white;
border-bottom:1px solid #ccc;
}

#container{
display:flex;
}

#mapa-grafo{
flex:1;
}

svg{
background:white;
}

.distrito{
fill:#e0e0e0;
stroke:white;
stroke-width:0.5px;
}

.link{
stroke:#ff5722;
stroke-width:2px;
stroke-opacity:0.7;
}

.node{
stroke:white;
stroke-width:1.5px;
cursor:pointer;
}

.label{
fill:white;
font-size:11px;
font-weight:bold;
pointer-events:none;
}

#legenda{
width:200px;
background:white;
border-left:1px solid #ccc;
padding:15px;
}

#tabela{
width:320px;
background:white;
border-left:1px solid #ccc;
padding:15px;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#fafafa;
}

#info{
position:absolute;
background:white;
border:1px solid #ccc;
padding:12px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
display:none;
}

#closePopup{
position:absolute;
top:4px;
right:6px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="controls">

<select id="recursoFiltro">
<option value="todos">Todos os recursos</option>
<option value="brigadista">Brigadista</option>
<option value="caminhao">Caminhão-pipa</option>
<option value="veiculo">4x4</option>
</select>

</div>

<div id="container">

<div id="mapa-grafo"></div>

<div id="legenda">

<h3>Legenda</h3>

<p>🔵 Rastreador (base)</p>
<p>🔴 Ocorrência</p>
<p>➝ Envio de recurso</p>

<p>O tamanho do nó azul representa a quantidade de recursos.</p>

</div>

<div id="tabela">

<h3>Despacho de Recursos</h3>

<table id="conexoesTable">

<thead>
<tr>
<th>Destino</th>
<th>Origem</th>
<th>Recurso</th>
<th>Qtd</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<div id="info"></div>

<script>

const width = window.innerWidth * 0.6;
const height = window.innerHeight * 0.9;

const svg = d3.select("#mapa-grafo")
.append("svg")
.attr("width",width)
.attr("height",height);

let filtroAtual="todos";

svg.append("defs")
.append("marker")
.attr("id","arrow")
.attr("viewBox","0 -5 10 10")
.attr("refX",22)
.attr("refY",0)
.attr("markerWidth",6)
.attr("markerHeight",6)
.attr("orient","auto")
.append("path")
.attr("d","M0,-5L10,0L0,5")
.attr("fill","#ff5722");

const pontos=[

{
id:"R1",
type:"rastreador",
coords:[-46.6333,-23.5505],
recursos:{brigadista:8,caminhao:2,veiculo:3}
},

{
id:"R2",
type:"rastreador",
coords:[-46.6900,-23.5700],
recursos:{brigadista:4,caminhao:5,veiculo:2}
},

{
id:"R3",
type:"rastreador",
coords:[-46.5300,-23.5400],
recursos:{brigadista:6,caminhao:1,veiculo:4}
},

{
id:"R4",
type:"rastreador",
coords:[-46.6500,-23.6500],
recursos:{brigadista:3,caminhao:3,veiculo:5}
},

{ id:"O1", type:"ocorrencia", coords:[-46.6200,-23.5800]},
{ id:"O2", type:"ocorrencia", coords:[-46.7000,-23.6200]},
{ id:"O3", type:"ocorrencia", coords:[-46.5800,-23.4500]}

];

const conexoes=[

{source:"R1",target:"O1",recurso:"brigadista",qtd:4},
{source:"R2",target:"O2",recurso:"caminhao",qtd:2},
{source:"R3",target:"O3",recurso:"veiculo",qtd:3},
{source:"R4",target:"O1",recurso:"brigadista",qtd:1},
{source:"R2",target:"O1",recurso:"caminhao",qtd:3},
{source:"R1",target:"O3",recurso:"veiculo",qtd:2}

];

d3.json("saopaulo_subprefeituras_poligonos.geojson").then(geojson=>{

const projection=d3.geoMercator()
.fitSize([width,height],geojson);

const pathGenerator=d3.geoPath().projection(projection);

svg.append("g")
.selectAll("path")
.data(geojson.features)
.enter()
.append("path")
.attr("class","distrito")
.attr("d",pathGenerator);

const linkGroup=svg.append("g");

const nodes=svg.append("g")
.selectAll("circle")
.data(pontos)
.enter()
.append("circle")
.attr("class","node")
.attr("cx",d=>projection(d.coords)[0])
.attr("cy",d=>projection(d.coords)[1])
.attr("fill",d=>d.type==="rastreador" ? "#3498db" : "#e74c3c")
.attr("r",8)
.on("click",(event,d)=>{

if(d.type!=="rastreador") return;

const pos=projection(d.coords);
mostrarInfo(d,pos[0],pos[1]);

});

svg.append("g")
.selectAll("text")
.data(pontos)
.enter()
.append("text")
.attr("class","label")
.attr("x",d=>projection(d.coords)[0])
.attr("y",d=>projection(d.coords)[1])
.attr("text-anchor","middle")
.attr("dominant-baseline","middle")
.text(d=>d.id);

function updateGraph(){

let dados;

if(filtroAtual==="todos")
dados=conexoes;
else
dados=conexoes.filter(d=>d.recurso===filtroAtual);

linkGroup.selectAll("line").remove();

linkGroup
.selectAll("line")
.data(dados)
.enter()
.append("line")
.attr("class","link")
.attr("marker-end","url(#arrow)")
.attr("x1",d=>projection(pontos.find(p=>p.id===d.source).coords)[0])
.attr("y1",d=>projection(pontos.find(p=>p.id===d.source).coords)[1])
.attr("x2",d=>projection(pontos.find(p=>p.id===d.target).coords)[0])
.attr("y2",d=>projection(pontos.find(p=>p.id===d.target).coords)[1]);

updateTabela(dados);

}

function updateTabela(dados){

const tbody=d3.select("#conexoesTable tbody");

tbody.html("");

dados.forEach(d=>{

tbody.append("tr")
.html(`
<td>${d.target}</td>
<td>${d.source}</td>
<td>${d.recurso}</td>
<td>${d.qtd}</td>
`);

});

}

function updateNodeSize(){

nodes.transition()
.duration(300)
.attr("r",d=>{

if(d.type!=="rastreador") return 8;

let valor;

if(filtroAtual==="todos")
valor=d.recursos.brigadista+d.recursos.caminhao+d.recursos.veiculo;
else
valor=d.recursos[filtroAtual];

return 6+valor*1.5;

});

}

function mostrarInfo(d,x,y){

const info=d3.select("#info");

info
.style("display","block")
.style("left",(x+20)+"px")
.style("top",(y-10)+"px")
.html(`
<div id="closePopup">✖</div>
<b>${d.id}</b><br>
Brigadistas: ${d.recursos.brigadista}<br>
Caminhões: ${d.recursos.caminhao}<br>
4x4: ${d.recursos.veiculo}
`);

d3.select("#closePopup").on("click",()=>{

info.style("display","none");

});

}

d3.select("#recursoFiltro").on("change",function(){

filtroAtual=this.value;

updateGraph();
updateNodeSize();

});

updateGraph();
updateNodeSize();

});

</script>

</body>
</html>
